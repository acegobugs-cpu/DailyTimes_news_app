  postgres:
    image: postgres:15-alpine
    container_name: dailytimes-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dailytimes
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - dailytimes-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dailytimes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dailytimes-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dailytimes-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - dailytimes-network
    restart: unless-stopped

networks:
  dailytimes-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
