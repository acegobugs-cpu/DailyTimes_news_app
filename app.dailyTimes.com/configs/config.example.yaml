server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 30s
  environment: "development"

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "your-password"
  dbname: "dailytimes"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

rabbitmq:
  host: "localhost"
  port: 5672
  user: "guest"
  password: "guest"
  vhost: "/"

jwt:
  secret: "change-this-to-a-secure-secret-key"
  access_duration: 15m
  refresh_duration: 168h  # 7 days
  issuer: "app.dailytimes.com"

grpc:
  host: "0.0.0.0"
  port: 50051

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  allow_credentials: true
